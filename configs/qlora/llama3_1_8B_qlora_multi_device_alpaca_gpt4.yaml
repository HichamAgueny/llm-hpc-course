# Config for multi-device QLoRA finetuning in lora_finetune_distributed.py
# using a Llama3.1 8B Instruct model
#

# This config works only for training on single device.

# NOTE: The host path '/cluster/projects/nn9970k/hicham/llm-hpc-course' is 
#       bind-mounted to '/workspace' inside the Apptainer container.
#       All paths below must use '/workspace' to be accessible during training.
#
# Root directory of the project (inside container)
project_dir: /workspace

# Shared resources directory (models, datasets, etc.)
shared_dir: ${project_dir}/shared

# Base model checkpoint directory (pre-trained Llama weights)
checkpoint_dir: ${shared_dir}/models/Llama-3.1-8B-Instruct

# Training dataset file path (XSum summarization dataset)
dataset_dir: ${shared_dir}/datasets/GPT-4-LLM/alpaca_gpt4_data.json

# Parent directory for all training outputs
result_dir: ${project_dir}/results

# Where fine-tuned model checkpoints/weights will be saved
output_dir: ${result_dir}/checkpoints_out/llama3_1_8B_qlora_multi_device

# Where training logs and metrics will be stored
log_dir: ${result_dir}/logs/qlora_finetune_8B_output

# Where profiling traces/timing data will be saved (if profiler enabled)
profiling_dir: ${result_dir}/profiles/profiling_outputs

# Tokenizer
tokenizer:
  _component_: torchtune.models.llama3.llama3_tokenizer
  path: ${checkpoint_dir}/original/tokenizer.model
  max_seq_len: null

# Model Arguments
model:
  _component_: torchtune.models.llama3_1.qlora_llama3_1_8b
  lora_attn_modules: ['q_proj', 'v_proj', 'output_proj']
  apply_lora_to_mlp: True
  apply_lora_to_output: False
  lora_rank: 8  # higher increases accuracy and memory
  lora_alpha: 16  # usually alpha=2*rank
  lora_dropout: 0.0

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${checkpoint_dir}
  checkpoint_files: [
    model-00001-of-00004.safetensors,
    model-00002-of-00004.safetensors,
    model-00003-of-00004.safetensors,
    model-00004-of-00004.safetensors
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: LLAMA3
resume_from_checkpoint: False
save_adapter_weights_only: True #True:LoRA weights are NOT merged - they are saved separately

# Dataset and Sampler
dataset:
  _component_: torchtune.datasets.instruct_dataset
  source: json
  data_files: ${dataset_dir}
  split: train
  packed: False  # True increases speed
seed: null
shuffle: True
batch_size: 2

# Optimizer and Scheduler
optimizer:
  _component_: torch.optim.AdamW
  fused: True
  weight_decay: 0.01
  lr: 3e-4
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 10

loss:
  _component_: torchtune.modules.loss.CEWithChunkedOutputLoss

# Training
epochs: 1
max_steps_per_epoch: 300 #null
gradient_accumulation_steps: 1  # Use to increase effective batch size
clip_grad_norm: null
compile: False  # torch.compile the model + loss, True increases speed + decreases memory

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${log_dir}
log_every_n_steps: 10
log_peak_memory_stats: True

# Environment
device: cuda
dtype: bf16
enable_activation_checkpointing: False  # True reduces memory
enable_activation_offloading: False  # True reduces memory


# Profiler (disabled)
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False

  #Output directory of trace artifacts
  output_dir: ${profiling_dir}

  #`torch.profiler.ProfilerActivity` types to trace
  cpu: True
  cuda: True

  #trace options passed to `torch.profiler.profile`
  profile_memory: False
  with_stack: False
  record_shapes: True
  with_flops: False

  # `torch.profiler.schedule` options:
  # wait_steps -> wait, warmup_steps -> warmup, active_steps -> active, num_cycles -> repeat
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
