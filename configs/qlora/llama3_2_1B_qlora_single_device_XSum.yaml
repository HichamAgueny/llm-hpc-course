# Config for single device QLoRA with lora_finetune_single_device.py
# using a Llama3.2 1B Instruct model
#
# This config assumes that you've run the following command before launching
# this run:
#   tune download meta-llama/Llama-3.2-1B-Instruct --output-dir /tmp/Llama-3.2-1B-Instruct --ignore-patterns "original/consolidated.00.pth"
#
# To launch on a single device, run the following command from root:
#   tune run lora_finetune_single_device --config llama3_2/1B_qlora_single_device
#
# You can add specific overrides through the command line. For example
# to override the checkpointer directory while launching training
# you can run:
#   tune run lora_finetune_single_device --config llama3_2/1B_qlora_single_device checkpointer.checkpoint_dir=<YOUR_CHECKPOINT_DIR>
#
# This config works only for training on single device.

# NOTE: The host path '/cluster/projects/nn9970k/hicham/llm-hpc-course' is 
#       bind-mounted to '/workspace' inside the Apptainer container.
#       All paths below must use '/workspace' to be accessible during training.
#
# Root directory of the project (inside container)
project_dir: /workspace

# Shared resources directory (models, datasets, etc.)
shared_dir: ${project_dir}/shared

# Base model checkpoint directory (pre-trained Llama weights)
checkpoint_dir: ${shared_dir}/models/Llama-3.2-1B-Instruct

# Training dataset file path (XSum summarization dataset)
dataset_dir: ${shared_dir}/datasets/XSum/xsum.json

# Parent directory for all training outputs
result_dir: ${project_dir}/results

# Where fine-tuned model checkpoints/weights will be saved
output_dir: ${result_dir}/checkpoints_out/llama3_2_1B_qlora_single_device

# Where training logs and metrics will be stored
log_dir: ${result_dir}/logs/qlora_finetune_1B_output

# Where profiling traces/timing data will be saved (if profiler enabled)
profiling_dir: ${result_dir}/profiles/profiling_outputs

# Model Arguments
model:
  _component_: torchtune.models.llama3_2.qlora_llama3_2_1b
  lora_attn_modules: ['q_proj', 'v_proj', 'output_proj']
  apply_lora_to_mlp: True
  lora_rank: 64  # higher increases accuracy and memory
  lora_alpha: 128  # usually alpha=2*rank
  lora_dropout: 0.0

# Tokenizer
tokenizer:
  _component_: torchtune.models.llama3.llama3_tokenizer
  path: ${checkpoint_dir}/original/tokenizer.model
  max_seq_len: null

checkpointer:
  _component_: torchtune.training.FullModelHFCheckpointer
  checkpoint_dir: ${checkpoint_dir}
  checkpoint_files: [
     model.safetensors
  ]
  recipe_checkpoint: null
  output_dir: ${output_dir}
  model_type: LLAMA3_2
resume_from_checkpoint: False
save_adapter_weights_only: True #True:LoRA weights are NOT merged - they are saved separately

# Dataset and Sampler specific to XSum dataset
dataset:
#  _component_: torchtune.datasets.alpaca_cleaned_dataset
#  packed: False  # True increases speed
  _component_: torchtune.datasets.instruct_dataset
  # Dataset loading parameters (passed to HF load_dataset)
  #source: EdinburghNLP/xsum
  source: json
  data_files: ${dataset_dir}
  split: train[:2000]

  # TorchTune-specific parameters
  column_map:
    input: document
    output: summary
  #template: torchtune.data.SummarizeTemplate
  train_on_input: false

# Add template configuration separately
template:
  _component_: torchtune.data.SummarizeTemplate

seed: null
shuffle: True
batch_size: 4

# Optimizer and Scheduler
optimizer:
  _component_: torch.optim.AdamW
  fused: True
  weight_decay: 0.01
  lr: 3e-4
lr_scheduler:
  _component_: torchtune.training.lr_schedulers.get_cosine_schedule_with_warmup
  num_warmup_steps: 100

loss:
  _component_: torchtune.modules.loss.CEWithChunkedOutputLoss

# Training
epochs: 1
max_steps_per_epoch: null
gradient_accumulation_steps: 1  # Use to increase effective batch size
clip_grad_norm: null
compile: False  # torch.compile the model + loss, True increases speed + decreases memory

# Logging
metric_logger:
  _component_: torchtune.training.metric_logging.DiskLogger
  log_dir: ${log_dir}
log_every_n_steps: 10
log_peak_memory_stats: True

# Environment
device: cuda
dtype: bf16

# Activations Memory
enable_activation_checkpointing: False  # True reduces memory
enable_activation_offloading: False  # True reduces memory


# Profiler (disabled)
profiler:
  _component_: torchtune.training.setup_torch_profiler
  enabled: False

  #Output directory of trace artifacts
  output_dir: ${profiling_dir}

  #`torch.profiler.ProfilerActivity` types to trace
  cpu: True
  cuda: True

  #trace options passed to `torch.profiler.profile`
  profile_memory: False
  with_stack: False
  record_shapes: True
  with_flops: False

  # `torch.profiler.schedule` options:
  # wait_steps -> wait, warmup_steps -> warmup, active_steps -> active, num_cycles -> repeat
  wait_steps: 5
  warmup_steps: 3
  active_steps: 2
  num_cycles: 1
